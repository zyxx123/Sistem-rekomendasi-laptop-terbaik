{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3>Edit Kriteria: {{ kriteria.nama }}</h3>
                <hr>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nama Kriteria</label>
                        <input type="text" name="nama" class="form-control" value="{{ kriteria.nama }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Atribut</label>
                        <select name="atribut" class="form-select" required>
                            <option value="benefit" {{ 'selected' if kriteria.atribut == 'benefit' else '' }}>Benefit</option>
                            <option value="cost" {{ 'selected' if kriteria.atribut == 'cost' else '' }}>Cost</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bobot Dasar</label>
                        <input type="number" step="0.01" name="bobot_dasar" class="form-control" value="{{ kriteria.bobot_dasar }}" required>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                        <a href="{{ url_for('admin.kriteria_index') }}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
