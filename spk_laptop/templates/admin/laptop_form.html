{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3>{{ action }} Laptop</h3>
                <hr>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Kode Laptop</label>
                        <input type="text" name="kode" class="form-control" value="{{ laptop.kode if laptop else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nama Laptop</label>
                        <input type="text" name="nama_laptop" class="form-control" value="{{ laptop.nama_laptop if laptop else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Harga (Rupiah)</label>
                        <input type="number" name="harga" class="form-control" value="{{ laptop.harga if laptop else '' }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">RAM (GB)</label>
                            <input type="number" name="ram" class="form-control" value="{{ laptop.ram if laptop else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">SSD (GB)</label>
                            <input type="number" name="ssd" class="form-control" value="{{ laptop.ssd if laptop else '' }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Processor Score</label>
                            <input type="number" name="processor_score" class="form-control" value="{{ laptop.processor_score if laptop else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Berat (kg)</label>
                            <input type="number" step="0.01" name="berat" class="form-control" value="{{ laptop.berat if laptop else '' }}" required>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Simpan</button>
                        <a href="{{ url_for('admin.laptop_index') }}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
